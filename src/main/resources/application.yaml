spring:
  application:
    name: testAwsS3
  elasticsearch:
    uris: ${SPRING_ELASTICSEARCH_URIS}
    connection-timeout: ${SPRING_ELASTICSEARCH_CONNECTION_TIMEOUT}
    socket-timeout: ${SPRING_ELASTICSEARCH_SOCKET_TIMEOUT}

# Swagger UI: http://localhost:8080/swagger-ui.html
# OpenAPI JSON: http://localhost:8080/v3/api-docs
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha

# Real values come only from env (see .env.dev / .env.prod and .env.example).
# S3: leave access-key/secret-key empty to use the SDK default credential chain (IAM, ~/.aws/credentials, etc.).
aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: ${AWS_S3_REGION}
    access-key: ${AWS_ACCESS_KEY_ID:}
    secret-key: ${AWS_SECRET_ACCESS_KEY:}
    session-token: ${AWS_SESSION_TOKEN:}
