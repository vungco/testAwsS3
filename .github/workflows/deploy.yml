# GitHub → Settings → Secrets and variables → Actions:
#   DOCKER_USERNAME  — Docker Hub username (namespace), ví dụ: myuser  → image: myuser/testawss3:latest
#   DOCKER_PASSWORD  — Docker Hub Access Token
#   EC2_HOST, EC2_USER, EC2_KEY
#
# Log có thể hiện ***/testawss3:latest — đó là GitHub che secret, không phải tag thật.
# invalid reference format: thư��ng do USERNAME có chữ HOA hoặc dính space/xuống dòng → đã lowercase + trim bên dư��i.

name: Deploy to EC2

on:
  push:
    branches: ["main"]

env:
  IMAGE_NAME: testawss3
  IMAGE_TAG: latest

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Hub username
        run: |
          if [ -z "${{ secrets.DOCKER_USERNAME }}" ]; then
            echo "::error::Thiếu secret DOCKER_USERNAME (Docker Hub user/namespace). Repo → Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push image
        run: |
          HUB_USER=$(echo -n "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]' | xargs)
          IMAGE="${HUB_USER}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - name: Configure SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY }}" | tr -d '\r' > ~/.ssh/ec2_deploy
          chmod 600 ~/.ssh/ec2_deploy
          ssh-keygen -y -f ~/.ssh/ec2_deploy >/dev/null 2>&1 || { echo "::error::EC2_KEY is not a valid OpenSSH private key PEM."; exit 1; }
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Pull and run on EC2
        run: |
          HUB_USER=$(echo -n "${{ secrets.DOCKER_USERNAME }}" | tr '[:upper:]' '[:lower:]' | xargs)
          IMAGE="${HUB_USER}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          echo "=== [deploy] Docker image to run on EC2: ${IMAGE} ==="
          echo "=== [deploy] Opening SSH (ConnectTimeout=30s). If this hangs or times out: check EC2 security group allows TCP 22 from the internet (GitHub runner IPs change), EC2_HOST is the public IP/DNS, instance is running. ==="
          set +e
          ssh -i ~/.ssh/ec2_deploy \
            -o ConnectTimeout=30 \
            -o ConnectionAttempts=2 \
            -o BatchMode=yes \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
            bash -s << EOF
          set -euo pipefail
          trap 'echo "::error::Remote deploy failed at line \$LINENO (exit \$?): \$BASH_COMMAND"' ERR
          DEPLOY_DIR=/home/deploy/testAwsS3
          echo "=== [deploy remote] DEPLOY_DIR=\$DEPLOY_DIR ==="
          echo "=== [deploy remote] Step: cd ==="
          cd "\$DEPLOY_DIR"
          echo "=== [deploy remote] Step: docker login (Hub) ==="
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${HUB_USER}" --password-stdin
          echo "=== [deploy remote] Step: docker pull ${IMAGE} ==="
          docker pull "${IMAGE}"
          echo "=== [deploy remote] Step: stop/remove old container ==="
          docker stop testawss3 2>/dev/null || true
          docker rm testawss3 2>/dev/null || true
          ENV_FILE="\$DEPLOY_DIR/.env.pro"
          echo "=== [deploy remote] Step: check env file ==="
          if [ ! -f "\$ENV_FILE" ]; then
            echo "::error::Missing env file: \$ENV_FILE — create it on the server under \$DEPLOY_DIR."
            exit 1
          fi
          echo "=== [deploy remote] Step: docker run (env-file=\$ENV_FILE) ==="
          # If Elasticsearch runs in another container, add: --network <same_network_as_elasticsearch>
          docker run -d --name testawss3 -p 8080:8080 --restart unless-stopped --env-file "\$ENV_FILE" "${IMAGE}"
          echo "=== [deploy remote] Done. ==="
          EOF
          SSH_EXIT=$?
          set -e
          if [ "$SSH_EXIT" -ne 0 ]; then
            echo "::error::SSH or remote script exited with code ${SSH_EXIT}. If you saw 'Connection timed out': EC2 security group / network. If you saw 'Permission denied': EC2_USER or EC2_KEY. If remote failed after SSH: read the '[deploy remote] Step' line above the error."
            exit "$SSH_EXIT"
          fi
